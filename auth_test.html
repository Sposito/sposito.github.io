<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Github.js Example</title>
  </head>
  <body>
    <div id="header">
      <span id="username"></span>
      <button id="logout-btn">Log out</button>
    </div>
    <div id="repo-list"></div>
    <script src="https://cdn.jsdelivr.net/npm/@octokit/core@4.2.0/dist-node/index.js"></script>
    <script>
      const clientId = '14ad7c88e69bf1db4ee0';
      const redirectUri = 'https://sposito.github.io/auth_test.html';
      const scope = 'repo';

      const usernameElem = document.getElementById('username');
      const logoutBtn = document.getElementById('logout-btn');
      const repoList = document.getElementById('repo-list');

      function authorizeUser() {
        const state = generateRandomString(32);
        localStorage.setItem('state', state);

        const url = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&state=${state}&scope=${scope}`;
        window.location.href = url;
      }

      function handleAuthorizationResponse() {
        const queryParams = new URLSearchParams(window.location.search);
        const code = queryParams.get('code');
        const state = queryParams.get('state');

        if (localStorage.getItem('state') !== state) {
          console.error('Invalid state.');
          return;
        }

        fetch(`https://github.com/login/oauth/access_token?client_id=${clientId}&code=${code}&redirect_uri=${redirectUri}`, {
          method: 'POST',
          headers: {
            'Accept': 'application/json'
          }
        }).then(response => response.json()).then(data => {
          const token = data.access_token;
          const octokit = new Octokit({
            auth: token
          });
          octokit.request('GET /user').then(({ data }) => {
            usernameElem.textContent = data.login;
          });
          octokit.request('GET /user/repos').then(({ data }) => {
            repoList.innerHTML = '';
            data.forEach(repo => {
              const li = document.createElement('li');
              li.textContent = repo.full_name;
              repoList.appendChild(li);
            });
          });
        });
      }

      function generateRandomString(length) {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
          result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
      }

      function handleLogout() {
        localStorage.clear();
        window.location.reload();
      }

      if (window.location.search.includes('code')) {
        handleAuthorizationResponse();
      } else {
        const token = localStorage.getItem('access_token');
        if (token) {
          const octokit = new Octokit({
            auth: token
          });
          octokit.request('GET /user').then(({ data }) => {
            usernameElem.textContent = data.login;
          });
          octokit.request('GET /user/repos').then(({ data }) => {
            repoList.innerHTML = '';
            data.forEach(repo => {
              const li = document.createElement('li');
              li.textContent = repo.full_name;
              repoList.appendChild(li);
            });
          });
        } else {
          authorizeUser();
        }
        logoutBtn.addEventListener('click', handleLogout);
      }
    </script>
  </body>
</html>
