<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Github.js Example</title>
  </head>
  <body>
    <button id="login-btn">Login with GitHub</button>
    <div id="repo-list"></div>
    <script src="https://cdn.jsdelivr.net/npm/@octokit/rest@17.2.0/dist/octokit.rest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/github-login@1.1.0/dist/github-login.min.js"></script>
    <script>
      const githubLogin = new GithubLogin({
        clientId: 'YOUR_CLIENT_ID',
        redirectUri: 'YOUR_REDIRECT_URI',
        scope: 'repo',
      });

      const loginBtn = document.getElementById('login-btn');
      const repoList = document.getElementById('repo-list');

      loginBtn.addEventListener('click', () => {
        githubLogin.login().then(token => {
          const octokit = new Octokit({
            auth: token,
          });
          octokit.repos.list().then(({ data }) => {
            repoList.innerHTML = '';
            data.forEach(repo => {
              const li = document.createElement('li');
              li.textContent = repo.full_name;
              repoList.appendChild(li);
            });
          });
        });
      });
    </script>
  </body>
</html>
